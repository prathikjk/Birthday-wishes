<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Swapna!</title>
    <style>
        body { text-align: center; font-family: Arial, sans-serif; background-color: #fce4ec; padding: 20px; }
        h1 { color: #d81b60; }
        p { font-size: 18px; color: #444; }
        .btn { background-color: #ff4081; color: white; padding: 10px 20px; text-decoration: none; font-size: 18px; border-radius: 5px; display: inline-block; margin-top: 20px; cursor: pointer; border: none; }
        .btn:hover { background-color: #c2185b; }
        img { max-width: 80%; height: auto; border-radius: 10px; margin: 20px auto; display: block; box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2); }
        #surprise { display: none; margin-top: 20px; font-size: 20px; color: #d81b60; font-weight: bold; }
        #hiddenCake { display: none; }
    </style>
    <script>
        function showSurprise() {
            document.getElementById("surprise").style.display = "block";
            document.getElementById("hiddenCake").style.display = "block";
        }
    </script>
</head>
<body>
    <h1>🎉 Happy Birthday, Swapna! 🎂</h1>
    
    <!-- Surprise Button -->
    <button class="btn" onclick="showSurprise()">Click here for a Surprise! 🎁</button>

    <!-- Hidden Surprise Message -->
    <p id="surprise">🎊 Surprise! 🎊 Wishing you a year full of happiness, success, and unforgettable moments! 🥳✨❤️</p>

    <!-- Hidden Cake Image (Now Centered) -->
    <img id="hiddenCake" src="https://lh3.googleusercontent.com/d/1OaIP-Ujc5X_wE3l8I30GjnbaCWjNV-8b=w1000" alt="Surprise Cake">

<img id="hiddenCake1" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTIOw5daeKrsguCWtqCW-LVrKIYfk_vCw2FHTgZoEKX2ezUumQ4y9wli0Ue&s=10" alt="Surprise Cake">
</body>
</html>
